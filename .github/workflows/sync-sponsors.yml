name: Sync Afdian sponsors

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync sponsors from Afdian
        env:
          AFDIAN_USER_ID: ${{ secrets.AFDIAN_USER_ID }}
          AFDIAN_TOKEN: ${{ secrets.AFDIAN_TOKEN }}
        run: node scripts/sync-sponsors.mjs sponsors.json

      - name: Commit sponsors.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sponsors.json
          if git diff --staged --quiet; then
            echo "No sponsor changes."
          else
            git commit --trailer "Co-authored-by: Cursor <cursoragent@cursor.com>" -m "chore: sync Afdian sponsors"
            git push
          fi
