<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章 — Weird Games Club</title>
<script src="js/site.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;700;900&family=Noto+Serif+SC:wght@400;600&family=Press+Start+2P&display=swap');

:root {
  --white: #ffffff;
  --off-white: #f5f5f7;
  --ink: #111111;
  --ink-dim: #444444;
  --ink-faint: #888888;
  --pink: #e8a0b4;
  --pink-bg: #fdf0f4;
  --pink-deep: #d4607e;
  --border: #e2e2e5;
  --border-dark: #111111;
  --cat-research: #5c7a9e;
  --cat-interview: #d4607e;
  --cat-news: #6a8f6e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--off-white);
  color: var(--ink);
  font-family: 'Noto Sans SC', sans-serif;
  line-height: 1.7;
}

.lang-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(255,255,255,0.92);
  border-bottom: 1px solid var(--border);
  padding: 10px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  backdrop-filter: blur(8px);
}
.lang-bar-left {
  display: flex;
  align-items: center;
  gap: 16px;
  min-width: 0;
}
.lang-bar-logo {
  display: flex;
  align-items: center;
  text-decoration: none;
  line-height: 0;
  flex-shrink: 0;
  transition: transform 0.2s;
}
.lang-bar-logo:hover { transform: translateY(-1px); }
.site-logo-img {
  height: 58px;
  width: auto;
  max-width: 260px;
  display: block;
  object-fit: contain;
  animation: logo-neon-flicker 3.5s infinite;
}
@keyframes logo-neon-flicker {
  0%,18%,20%,22%,53%,55%,100% {
    filter:
      drop-shadow(0 0 2px var(--pink))
      drop-shadow(0 0 8px var(--pink))
      drop-shadow(0 0 18px rgba(232, 160, 180, 0.9));
  }
  19%,21%,54% {
    filter: drop-shadow(0 0 1px rgba(232, 160, 180, 0.2));
  }
}
.bar-title {
  font-size: 0.78rem;
  color: var(--ink-faint);
  font-weight: 300;
}
.bar-title a {
  color: inherit;
  text-decoration: none;
}
.bar-title a:hover { color: var(--ink); }
.lang-switch { display: flex; border: 1px solid var(--border-dark); border-radius: 4px; overflow: hidden; }
.lang-btn {
  background: none; border: none;
  padding: 5px 14px;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.1em; cursor: pointer;
  color: var(--ink-dim); transition: all 0.15s;
}
.lang-btn.active { background: var(--ink); color: var(--white); }

.article-wrap {
  max-width: 720px;
  margin: 0 auto;
  padding: calc(72px + 40px) 24px 80px;
}

.article-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}

.article-cover {
  width: 100%;
  max-height: 360px;
  overflow: hidden;
  background: #eaeaea;
  border-bottom: 1px solid var(--border);
}
.article-cover.hidden { display: none; }
.article-cover img {
  width: 100%;
  height: auto;
  max-height: 360px;
  object-fit: cover;
  display: block;
}

.article-header {
  padding: 36px 40px 28px;
  border-bottom: 1px solid var(--border);
}

.article-cat {
  display: inline-block;
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 10px;
  border-radius: 3px;
  color: var(--white);
  margin-bottom: 16px;
}
.cat-research { background: var(--cat-research); }
.cat-interview { background: var(--cat-interview); }
.cat-news { background: var(--cat-news); }

.article-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(1.4rem, 3.5vw, 1.85rem);
  font-weight: 600;
  line-height: 1.45;
  color: var(--ink);
  margin-bottom: 16px;
}

.article-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  font-size: 0.82rem;
  color: var(--ink-faint);
}
.meta-sep { color: var(--border); }

.article-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  padding: 16px 40px;
  background: var(--pink-bg);
  border-bottom: 1px solid var(--border);
}
.article-tag {
  font-size: 0.75rem;
  color: var(--pink-deep);
  background: var(--white);
  padding: 3px 10px;
  border-radius: 3px;
  border: 1px solid var(--pink);
}

.article-body {
  padding: 32px 40px 40px;
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  color: var(--ink-dim);
  line-height: 1.95;
  font-weight: 400;
}
.article-body > :first-child { margin-top: 0; }
.article-body > :last-child { margin-bottom: 0; }
.article-body p + p { margin-top: 1.1em; }
.article-body h2 {
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--ink);
  margin: 2em 0 0.75em;
  line-height: 1.4;
}
.article-body h3 {
  font-size: 1.12rem;
  font-weight: 600;
  color: var(--ink);
  margin: 1.6em 0 0.6em;
}
.article-body ul, .article-body ol {
  margin: 0.8em 0;
  padding-left: 1.5em;
}
.article-body li + li { margin-top: 0.35em; }
.article-body blockquote {
  margin: 1.2em 0;
  padding: 14px 18px;
  border-left: 3px solid var(--pink);
  background: var(--pink-bg);
  color: var(--ink-dim);
  border-radius: 0 6px 6px 0;
}
.article-body hr {
  border: none;
  border-top: 1px solid var(--border);
  margin: 2em 0;
}
.article-body img {
  max-width: 100%;
  height: auto;
  border-radius: 8px;
  margin: 1.2em 0;
  display: block;
}
.article-body figure.article-figure {
  margin: 1.6em 0;
}
.article-body figure.article-figure img {
  margin: 0;
  width: 100%;
}
.article-body figcaption {
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.82rem;
  color: var(--ink-faint);
  text-align: center;
  margin-top: 0.6em;
  line-height: 1.6;
}
.article-body code {
  font-family: Consolas, 'Courier New', monospace;
  font-size: 0.88em;
  background: var(--off-white);
  padding: 2px 6px;
  border-radius: 4px;
}
.article-body pre {
  background: var(--off-white);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
  overflow-x: auto;
  margin: 1.2em 0;
}
.article-body pre code {
  background: none;
  padding: 0;
}
.article-body a {
  color: var(--pink-deep);
  text-decoration: underline;
  text-underline-offset: 3px;
}
.article-body strong { color: var(--ink); font-weight: 600; }

.article-nav {
  margin-top: 32px;
  display: flex;
  justify-content: space-between;
  gap: 16px;
}
.nav-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  text-decoration: none;
  color: var(--ink-dim);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  transition: color 0.15s;
}
.nav-link:hover { color: var(--ink); }

.page-footer {
  text-align: center;
  padding: 32px 24px 48px;
  border-top: 1px solid var(--border);
  max-width: 720px;
  margin: 0 auto;
}
.footer-copy {
  font-size: 0.7rem;
  color: var(--ink-faint);
  margin-top: 8px;
}

.back-to-top {
  position: fixed;
  right: calc(18px + env(safe-area-inset-right));
  bottom: calc(22px + env(safe-area-inset-bottom));
  z-index: 90;
  width: 38px;
  height: 38px;
  border: 1px solid var(--border-dark);
  background: rgba(255, 255, 255, 0.96);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
  transition: opacity 0.25s, visibility 0.25s, transform 0.2s;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
}
.back-to-top.visible {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}
.back-to-top:hover { transform: translateY(-2px); }
.back-to-top-triangle {
  width: 0; height: 0;
  border-left: 7px solid transparent;
  border-right: 7px solid transparent;
  border-bottom: 9px solid var(--ink);
  margin-top: -2px;
}

@media (max-width: 576px) {
  .lang-bar { padding: 8px 16px; }
  .site-logo-img { height: 44px; max-width: 200px; }
  .bar-title { display: none; }
  .article-wrap { padding: calc(72px + 24px) 16px 60px; }
  .article-header { padding: 24px 20px 20px; }
  .article-tags { padding: 12px 20px; }
  .article-body { padding: 24px 20px 32px; }
}

.lang-zh-inline, .lang-en-inline { display: none; }
.lang-zh-inline.visible, .lang-en-inline.visible { display: inline; }
</style>
</head>
<body>

<div class="lang-bar">
  <div class="lang-bar-left">
    <a class="lang-bar-logo" href="index.html" aria-label="返回主页">
      <img class="site-logo-img" src="logo2.png" alt="Weird Games Club">
    </a>
    <span class="bar-title">
      <a href="archive.html">
        <span class="lang-zh-inline">异味档案</span>
        <span class="lang-en-inline">Archives</span>
      </a>
    </span>
  </div>
  <div class="lang-switch">
    <button class="lang-btn" id="btnZH" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="btnEN" onclick="setLang('en')">EN</button>
  </div>
</div>

<article class="article-wrap">
  <div class="article-card">
    <div class="article-cover hidden" id="articleCover"></div>
    <header class="article-header">
      <span class="article-cat" id="articleCat">—</span>
      <h1 class="article-title" id="articleTitle">加载中…</h1>
      <div class="article-meta" id="articleMeta">
        <span id="articleAuthor"></span>
        <span class="meta-sep">·</span>
        <time id="articleDate"></time>
      </div>
    </header>
    <div class="article-tags" id="articleTags"></div>
    <div class="article-body" id="articleBody"></div>
  </div>

  <nav class="article-nav">
    <a class="nav-link" href="archive.html">
      ← <span class="lang-zh-inline">返回档案列表</span><span class="lang-en-inline">Back to Archives</span>
    </a>
    <a class="nav-link" href="index.html">
      <span class="lang-zh-inline">主页</span><span class="lang-en-inline">Home</span> →
    </a>
  </nav>
</article>

<button class="back-to-top" id="backToTop" type="button" aria-label="返回顶部" onclick="window.scrollTo({top:0,behavior:'smooth'})">
  <span class="back-to-top-triangle"></span>
</button>

<div class="page-footer">
  <div class="footer-copy">© 2026 异味游戏同好会 Weird Games Club</div>
</div>

<script src="js/frontmatter.js"></script>
<script src="js/images.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="article.js"></script>
<script>
function setLang(lang) {
  const isZH = lang === 'zh';
  document.documentElement.lang = isZH ? 'zh' : 'en';
  document.getElementById('btnZH').classList.toggle('active', isZH);
  document.getElementById('btnEN').classList.toggle('active', !isZH);
  document.querySelectorAll('.lang-zh-inline').forEach(el => el.classList.toggle('visible', isZH));
  document.querySelectorAll('.lang-en-inline').forEach(el => el.classList.toggle('visible', !isZH));
  if (window.articleOnLangChange) window.articleOnLangChange(lang);
}
setLang('zh');
(function() {
  const btn = document.getElementById('backToTop');
  if (!btn) return;
  const toggle = () => btn.classList.toggle('visible', window.scrollY > 280);
  window.addEventListener('scroll', toggle, { passive: true });
  toggle();
})();
</script>
</body>
</html>
