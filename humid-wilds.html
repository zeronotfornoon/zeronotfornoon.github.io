<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>异味林地 | The Humid Wilds</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400;700&family=Press+Start+2P&display=swap');

  :root {
    --bg: #0d110e;
    --moss: #3a5c3e;
    --pale-moss: #6a8f6e;
    --mushroom: #c8a96e;
    --pale-mushroom: #e8d5a8;
    --text: #c8d4c0;
    --text-dim: #7a9070;
    --panel: rgba(8, 12, 8, 0.72);
    --border: rgba(106, 143, 110, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', serif;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
    position: relative;
  }

  /* ── 背景 ── */
  .forest-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
    background-image: url('Background.png');
    background-size: cover;
    background-position: center 78%;
    background-repeat: no-repeat;
  }
  .forest-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(5, 8, 5, 0.55) 0%,
      rgba(5, 8, 5, 0.45) 40%,
      rgba(5, 8, 5, 0.72) 100%
    );
  }
  .spore {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(244, 233, 201, 0.95) 0%, rgba(200, 169, 110, 0.5) 60%, transparent 100%);
    box-shadow: 0 0 6px 1px rgba(200, 169, 110, 0.7);
    animation: float linear infinite;
  }
  .spore.flicker {
    animation: float linear infinite, flicker ease-in-out infinite;
  }
  @keyframes float {
    0%   { transform: translateY(0) translateX(0) scale(0.6); opacity: 0; }
    8%   { opacity: 1; }
    50%  { transform: translateY(-50vh) translateX(calc(var(--drift) * 0.5)) scale(1); }
    92%  { opacity: 0.9; }
    100% { transform: translateY(-105vh) translateX(var(--drift)) scale(0.7); opacity: 0; }
  }
  @keyframes flicker {
    0%, 100% { filter: brightness(1); }
    50%      { filter: brightness(2.6); }
  }
  .title-spore {
    position: absolute;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255, 243, 218, 1) 0%, rgba(200, 169, 110, 0.6) 55%, transparent 100%);
    box-shadow: 0 0 8px 2px rgba(244, 233, 201, 0.8);
    pointer-events: none;
    animation: titleTwinkle ease-in-out infinite;
  }
  @keyframes titleTwinkle {
    0%, 100% { opacity: 0.15; transform: scale(0.7); }
    50%      { opacity: 1; transform: scale(1.15); }
  }
  .mist-layer {
    position: absolute;
    inset: -15% -15%;
    background:
      radial-gradient(ellipse 45% 30% at 25% 65%, rgba(200, 169, 110, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 28% at 75% 35%, rgba(180, 200, 170, 0.05) 0%, transparent 70%);
    animation: drift 24s ease-in-out infinite alternate;
  }
  @keyframes drift {
    0%   { transform: translateX(-4%) translateY(0) scale(1); }
    100% { transform: translateX(4%) translateY(-3%) scale(1.08); }
  }

  /* ── 主布局 ── */
  .wilds-wrap {
    position: relative;
    z-index: 1;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 24px 20px calc(118px + env(safe-area-inset-bottom));
    animation: fadeIn 1.2s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    backdrop-filter: blur(4px);
    padding: 24px 22px;
    margin-bottom: 16px;
  }

  .wilds-title {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: clamp(1.5rem, 5vw, 2rem);
    font-weight: 900;
    color: #f4e9c9;
    text-align: center;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    position: relative;
    text-shadow:
      2px 0 0 #2a3a1e, -2px 0 0 #2a3a1e,
      0 2px 0 #2a3a1e, 0 -2px 0 #2a3a1e,
      0 0 18px rgba(200, 169, 110, 0.35);
  }
  .wilds-subtitle {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    color: var(--mushroom);
    text-align: center;
    letter-spacing: 0.15em;
    margin-bottom: 18px;
  }

  .weather-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    font-size: 0.92rem;
    color: #d8e4d0;
    margin-bottom: 4px;
  }
  .weather-label { color: var(--text-dim); }
  .weather-value {
    font-weight: 600;
    color: var(--pale-mushroom);
  }
  .weather-icon { margin-right: 6px; }

  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--moss), transparent);
    margin: 18px 0;
  }

  /* ── 操作按钮 ── */
  .action-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .action-grid .action-btn:last-child:nth-child(odd) {
    grid-column: 1 / -1;
  }
  .action-btn {
    background: rgba(58, 92, 62, 0.25);
    border: 1px solid var(--moss);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.88rem;
    padding: 14px 10px;
    min-height: 48px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: all 0.25s;
    border-radius: 4px;
  }
  .action-btn:hover {
    border-color: var(--pale-moss);
    background: rgba(58, 92, 62, 0.45);
    color: #f4e9c9;
  }
  .action-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }
  .action-btn.cooldown {
    font-size: 0.8rem;
    line-height: 1.35;
    white-space: normal;
  }

  /* ── 进度条 ── */
  .stat-row {
    margin-bottom: 14px;
  }
  .stat-row:last-child { margin-bottom: 0; }
  .stat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.85rem;
    margin-bottom: 6px;
    color: #d8e4d0;
  }
  .stat-name { color: var(--text-dim); }
  .stat-pct { color: var(--pale-mushroom); font-weight: 600; }
  .stat-bar {
    height: 10px;
    background: rgba(0, 0, 0, 0.35);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid rgba(106, 143, 110, 0.3);
  }
  .stat-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }
  .stat-fill.humidity {
    background: linear-gradient(90deg, #2a4a5e, #4a8aaa);
  }
  .stat-fill.mycelium {
    background: linear-gradient(90deg, #3a5c3e, #8fbc8f);
  }

  /* ── 资助人 / 背包 ── */
  .section-title {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #f4e9c9;
    letter-spacing: 0.08em;
    text-align: center;
    margin-bottom: 4px;
  }
  .section-title.clickable {
    cursor: pointer;
    transition: color 0.2s;
  }
  .section-title.clickable:hover { color: var(--pale-mushroom); }

  .backpack-info {
    font-size: 0.88rem;
    color: #d8e4d0;
    text-align: center;
    line-height: 1.8;
  }
  .backpack-count {
    color: var(--pale-mushroom);
    font-weight: 600;
  }

  /* ── 会员卡（底部固定） ── */
  .member-card-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 10;
    background: rgba(8, 12, 8, 0.92);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(8px);
    padding: 12px 20px calc(12px + env(safe-area-inset-bottom));
  }
  .member-card-inner {
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .member-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--moss);
    flex-shrink: 0;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: #f4e9c9;
    margin-bottom: 2px;
  }
  .member-tag {
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.06em;
  }

  /* ── 音乐开关 ── */
  .music-toggle {
    position: fixed;
    top: calc(12px + env(safe-area-inset-top));
    right: calc(12px + env(safe-area-inset-right));
    z-index: 20;
    background: rgba(8, 12, 8, 0.8);
    border: 1px solid var(--moss);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.75rem;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 4px;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .music-toggle:hover {
    border-color: var(--pale-moss);
    color: #f4e9c9;
  }

  /* ── 弹窗 ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(5, 8, 5, 0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: rgba(12, 18, 12, 0.96);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 24px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    animation: fadeIn 0.4s ease;
  }
  .modal-title {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #f4e9c9;
    margin-bottom: 8px;
    letter-spacing: 0.06em;
  }
  .modal-desc {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 20px;
    line-height: 1.7;
  }
  .modal-text {
    font-size: 0.92rem;
    color: #d8e4d0;
    line-height: 1.9;
    margin-bottom: 24px;
  }

  .avatar-picker {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .avatar-option {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.2s;
    opacity: 0.65;
  }
  .avatar-option img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .avatar-option.selected {
    border-color: var(--mushroom);
    opacity: 1;
    box-shadow: 0 0 12px rgba(200, 169, 110, 0.5);
  }
  .avatar-option:hover { opacity: 1; }

  .name-input {
    width: 100%;
    background: rgba(0, 0, 0, 0.35);
    border: 1px solid var(--moss);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    border-radius: 4px;
    margin-bottom: 20px;
    outline: none;
  }
  .name-input:focus { border-color: var(--pale-moss); }
  .name-input::placeholder { color: var(--text-dim); }

  .modal-btn {
    background: rgba(58, 92, 62, 0.4);
    border: 1px solid var(--moss);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 0.88rem;
    padding: 12px 32px;
    cursor: pointer;
    letter-spacing: 0.06em;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .modal-btn:hover {
    background: rgba(58, 92, 62, 0.65);
    color: #f4e9c9;
    border-color: var(--pale-moss);
  }
  .modal-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* ── 资助人列表弹窗 ── */
  .sponsor-modal {
    max-width: 480px;
    max-height: 70vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .sponsor-list {
    list-style: none;
    overflow-y: auto;
    max-height: 50vh;
    margin-bottom: 16px;
    text-align: left;
  }
  .sponsor-list li {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(106, 143, 110, 0.2);
    font-size: 0.88rem;
    color: #d8e4d0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .sponsor-list li:last-child { border-bottom: none; }
  .sponsor-name { color: var(--pale-mushroom); font-weight: 600; }
  .sponsor-amount { color: var(--text-dim); font-size: 0.8rem; }
  .sponsor-loading, .sponsor-empty {
    font-size: 0.85rem;
    color: var(--text-dim);
    padding: 20px;
    line-height: 1.8;
  }
  .sponsor-link {
    color: var(--mushroom);
    text-decoration: none;
  }
  .sponsor-link:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .forest-bg { background-position: center 85%; }
    .wilds-wrap { padding: 16px 14px calc(108px + env(safe-area-inset-bottom)); }
    .panel { padding: 18px 16px; margin-bottom: 12px; }
    .wilds-title { font-size: clamp(1.35rem, 6vw, 1.85rem); }
    .weather-row { font-size: 0.88rem; }
    .action-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .action-btn { font-size: 0.84rem; padding: 12px 8px; min-height: 46px; }
    .stat-header { font-size: 0.82rem; }
    .section-title { font-size: 0.9rem; }
    .backpack-info { font-size: 0.85rem; }
    .modal { padding: 22px 18px; max-height: calc(100vh - 32px); }
    .sponsor-modal { max-height: calc(100vh - 40px); }
    .avatar-option { width: 60px; height: 60px; }
    .member-card-inner { gap: 10px; }
    .member-avatar { width: 42px; height: 42px; }
    .member-name { font-size: 0.88rem; }
    .music-toggle { font-size: 0.7rem; padding: 7px 12px; }
  }

  @media (max-width: 360px) {
    .action-btn { font-size: 0.78rem; padding: 11px 6px; }
    .action-btn.cooldown { font-size: 0.72rem; line-height: 1.35; }
  }
</style>
</head>
<body>

<div class="forest-bg" id="forestBg">
  <div class="mist-layer"></div>
</div>

<button class="music-toggle" id="musicToggle" onclick="toggleMusic()">♪ 音乐开启</button>

<audio id="forestAudio" loop preload="auto">
  <source src="siarhei_korbut-forest-391164.mp3" type="audio/mpeg">
</audio>

<div class="wilds-wrap">
  <div class="panel">
    <div class="wilds-title" id="wildsTitle">异味林地</div>
    <div class="wilds-subtitle">THE HUMID WILDS</div>

    <div class="weather-row">
      <span class="weather-label">当前天气</span>
      <span class="weather-value" id="weatherDisplay">
        <span class="weather-icon" id="weatherIcon">☀</span>
        <span id="weatherText">晴</span>
      </span>
    </div>

    <div class="divider"></div>

    <div class="action-grid">
      <button class="action-btn" id="btnCompost" onclick="doCompost()">堆肥</button>
      <button class="action-btn" onclick="showComingSoon('捡果子')">捡果子</button>
      <button class="action-btn" onclick="showComingSoon('动物小屋')">动物小屋</button>
      <button class="action-btn" onclick="showComingSoon('探索林地')">探索林地</button>
      <button class="action-btn" onclick="showWildMushroom()">采野菌</button>
    </div>

    <div class="divider"></div>

    <div class="stat-row">
      <div class="stat-header">
        <span class="stat-name">湿度</span>
        <span class="stat-pct" id="humidityPct">20%</span>
      </div>
      <div class="stat-bar">
        <div class="stat-fill humidity" id="humidityBar" style="width:20%"></div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-header">
        <span class="stat-name">菌丝活力</span>
        <span class="stat-pct" id="myceliumPct">20%</span>
      </div>
      <div class="stat-bar">
        <div class="stat-fill mycelium" id="myceliumBar" style="width:20%"></div>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="section-title clickable" onclick="openSponsorModal()">「异味林地资助人」</div>
    <div class="divider"></div>
    <div class="backpack-info">
      背包：<span class="backpack-count" id="backpackCount">0</span> / <span id="backpackMax">50</span>
    </div>
  </div>
</div>

<div class="member-card-bar" id="memberCardBar" style="display:none;">
  <div class="member-card-inner">
    <img class="member-avatar" id="memberAvatar" src="" alt="头像">
    <div class="member-info">
      <div class="member-name" id="memberName"></div>
      <div class="member-tag">异味林地访客会员卡</div>
    </div>
  </div>
</div>

<!-- 创建会员卡弹窗 -->
<div class="modal-overlay" id="createCardModal">
  <div class="modal">
    <div class="modal-title">请创建会员卡</div>
    <div class="modal-desc">选择你的林地形象，留下一个名字吧</div>
    <div class="avatar-picker" id="avatarPicker">
      <div class="avatar-option selected" data-avatar="character1.jpg" onclick="selectAvatar(this)">
        <img src="character1.jpg" alt="角色1">
      </div>
      <div class="avatar-option" data-avatar="character2.jpg" onclick="selectAvatar(this)">
        <img src="character2.jpg" alt="角色2">
      </div>
      <div class="avatar-option" data-avatar="character3.jpg" onclick="selectAvatar(this)">
        <img src="character3.jpg" alt="角色3">
      </div>
    </div>
    <input class="name-input" id="nameInput" type="text" placeholder="输入你的名字" maxlength="20">
    <button class="modal-btn" id="createCardBtn" onclick="createCard()">创建会员卡</button>
  </div>
</div>

<!-- 通用提示弹窗 -->
<div class="modal-overlay hidden" id="alertModal">
  <div class="modal">
    <div class="modal-text" id="alertText"></div>
    <button class="modal-btn" onclick="closeAlert()">好的</button>
  </div>
</div>

<!-- 资助人弹窗 -->
<div class="modal-overlay hidden" id="sponsorModal">
  <div class="modal sponsor-modal">
    <div class="modal-title">异味林地资助人</div>
    <div class="modal-desc">感谢每一位在爱发电上支持林地的人</div>
    <div id="sponsorContent">
      <div class="sponsor-loading">正在同步爱发电数据……</div>
    </div>
    <button class="modal-btn" onclick="closeSponsorModal()">关闭</button>
  </div>
</div>

<script>
  const STORAGE_KEY = 'humidWildsState';
  const CARD_KEY = 'humidWildsCard';
  const MUSIC_KEY = 'humidWildsMusic';
  const BACKPACK_MAX = 50;
  const COMPOST_COOLDOWN_MS = 24 * 60 * 60 * 1000;

  // 爱发电用户 ID（manwithouttalent）
  // 若 API 无法直接调用，可改用同目录下的 sponsors.json 作为备用数据源
  const AFDIAN_USER_ID = '';
  const AFDIAN_SLUG = 'manwithouttalent';

  const WEATHERS = [
    { name: '晴', icon: '☀', humidityBonus: 0 },
    { name: '雾', icon: '🌫', humidityBonus: 8 },
    { name: '雨', icon: '🌧', humidityBonus: 18 },
    { name: '阴', icon: '☁', humidityBonus: 5 }
  ];

  let selectedAvatar = 'character1.jpg';
  let state = null;
  let compostTimer = null;

  function generateForest() {
    const bg = document.getElementById('forestBg');
    for (let i = 0; i < 36; i++) {
      const s = document.createElement('div');
      s.className = 'spore';
      const x = Math.random() * 100;
      const duration = 7 + Math.random() * 14;
      const delay = Math.random() * 20;
      const drift = (Math.random() - 0.5) * 120;
      const size = 2.5 + Math.random() * 4.5;
      if (Math.random() < 0.35) {
        s.classList.add('flicker');
        const flickerDuration = 1.5 + Math.random() * 2.5;
        const flickerDelay = Math.random() * 4;
        s.style.animationDuration = `${duration}s, ${flickerDuration}s`;
        s.style.animationDelay = `-${delay}s, -${flickerDelay}s`;
      } else {
        s.style.animationDuration = `${duration}s`;
        s.style.animationDelay = `-${delay}s`;
      }
      s.style.cssText += `
        left:${x}%;
        bottom:${-Math.random() * 10}px;
        width:${size}px;height:${size}px;
        --drift:${drift}px;
      `;
      bg.appendChild(s);
    }
  }

  function generateTitleSpores() {
    const title = document.getElementById('wildsTitle');
    for (let i = 0; i < 9; i++) {
      const t = document.createElement('div');
      t.className = 'title-spore';
      const x = Math.random() * 100;
      const y = -30 + Math.random() * 140;
      const size = 2 + Math.random() * 3.5;
      const duration = 1.8 + Math.random() * 2.4;
      const delay = Math.random() * 3;
      t.style.cssText = `
        left:${x}%;
        top:${y}%;
        width:${size}px;height:${size}px;
        animation-duration:${duration}s;
        animation-delay:-${delay}s;
      `;
      title.appendChild(t);
    }
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  function clamp(val, min, max) {
    return Math.min(max, Math.max(min, val));
  }

  function initState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    const today = todayStr();

    if (saved) {
      state = JSON.parse(saved);
      migrateCompostState(state, today);
      if (state.date !== today) {
        state.date = today;
        state.weather = pickWeather();
        state.humidity = calcBaseHumidity(state.weather);
      }
    } else {
      const weather = pickWeather();
      state = {
        date: today,
        weather: weather,
        humidity: calcBaseHumidity(weather),
        mycelium: randomAround(20, 3),
        lastCompostAt: 0,
        backpackCount: 0,
        backpackMax: BACKPACK_MAX
      };
    }
    saveState();
    renderState();
  }

  function pickWeather() {
    return WEATHERS[Math.floor(Math.random() * WEATHERS.length)];
  }

  function randomAround(base, range) {
    return clamp(Math.round(base + (Math.random() * range * 2 - range)), 5, 95);
  }

  function calcBaseHumidity(weather) {
    return clamp(randomAround(20, 3) + weather.humidityBonus, 5, 95);
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function renderState() {
    document.getElementById('weatherIcon').textContent = state.weather.icon;
    document.getElementById('weatherText').textContent = state.weather.name;
    document.getElementById('humidityPct').textContent = state.humidity + '%';
    document.getElementById('humidityBar').style.width = state.humidity + '%';
    document.getElementById('myceliumPct').textContent = state.mycelium + '%';
    document.getElementById('myceliumBar').style.width = state.mycelium + '%';
    document.getElementById('backpackCount').textContent = state.backpackCount;
    document.getElementById('backpackMax').textContent = state.backpackMax;

    renderCompostButton();
  }

  function selectAvatar(el) {
    document.querySelectorAll('.avatar-option').forEach(a => a.classList.remove('selected'));
    el.classList.add('selected');
    selectedAvatar = el.dataset.avatar;
  }

  function createCard() {
    const name = document.getElementById('nameInput').value.trim();
    if (!name) {
      document.getElementById('nameInput').focus();
      return;
    }
    const card = { name, avatar: selectedAvatar };
    localStorage.setItem(CARD_KEY, JSON.stringify(card));
    document.getElementById('createCardModal').classList.add('hidden');
    showMemberCard(card);
    tryPlayMusic();
  }

  function showMemberCard(card) {
    document.getElementById('memberAvatar').src = card.avatar;
    document.getElementById('memberName').textContent = card.name;
    document.getElementById('memberCardBar').style.display = 'block';
  }

  function checkMemberCard() {
    const saved = localStorage.getItem(CARD_KEY);
    if (saved) {
      showMemberCard(JSON.parse(saved));
      document.getElementById('createCardModal').classList.add('hidden');
      tryPlayMusic();
    } else {
      document.getElementById('createCardModal').classList.remove('hidden');
    }
  }

  function doCompost() {
    if (!canCompost()) return;
    state.lastCompostAt = Date.now();
    state.mycelium = clamp(state.mycelium + randomAround(12, 4), 0, 100);
    saveState();
    renderState();
    showAlert('你撒下了肥料，菌丝微微颤动');
  }

  function showAlert(text) {
    document.getElementById('alertText').textContent = text;
    document.getElementById('alertModal').classList.remove('hidden');
  }

  function closeAlert() {
    document.getElementById('alertModal').classList.add('hidden');
  }

  function canCompost() {
    if (!state.lastCompostAt) return true;
    return Date.now() - state.lastCompostAt >= COMPOST_COOLDOWN_MS;
  }

  function getCompostRemainMs() {
    if (!state.lastCompostAt) return 0;
    const remain = COMPOST_COOLDOWN_MS - (Date.now() - state.lastCompostAt);
    return remain > 0 ? remain : 0;
  }

  function formatCompostRemain(ms) {
    const totalSec = Math.ceil(ms / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    if (h > 0) return `${h}小时${m}分后可堆肥`;
    if (m > 0) return `${m}分后可堆肥`;
    return `${totalSec}秒后可堆肥`;
  }

  function renderCompostButton() {
    const btn = document.getElementById('btnCompost');
    if (canCompost()) {
      btn.disabled = false;
      btn.classList.remove('cooldown');
      btn.textContent = '堆肥';
      if (compostTimer) {
        clearInterval(compostTimer);
        compostTimer = null;
      }
    } else {
      btn.disabled = true;
      btn.classList.add('cooldown');
      btn.textContent = formatCompostRemain(getCompostRemainMs());
      if (!compostTimer) {
        compostTimer = setInterval(renderCompostButton, 30000);
      }
    }
  }

  function migrateCompostState(state, today) {
    if (state.lastCompostAt == null) {
      if (state.lastCompost) {
        state.lastCompostAt = state.lastCompost === today ? Date.now() : 0;
        delete state.lastCompost;
      } else {
        state.lastCompostAt = 0;
      }
    }
  }

  function showWildMushroom() {
    showAlert('野菌还未破土而出，请耐心等待……');
  }

  function showComingSoon(feature) {
    showAlert(`${feature}功能即将开放，林地还在生长中……`);
  }

  function toggleMusic() {
    const audio = document.getElementById('forestAudio');
    const btn = document.getElementById('musicToggle');
    if (audio.paused) {
      audio.play().then(() => {
        btn.textContent = '♪ 音乐开启';
        localStorage.setItem(MUSIC_KEY, 'on');
      }).catch(() => {
        btn.textContent = '♪ 点击播放';
      });
    } else {
      audio.pause();
      btn.textContent = '♪ 音乐关闭';
      localStorage.setItem(MUSIC_KEY, 'off');
    }
  }

  function tryPlayMusic() {
    const pref = localStorage.getItem(MUSIC_KEY);
    const audio = document.getElementById('forestAudio');
    const btn = document.getElementById('musicToggle');
    if (pref === 'off') {
      btn.textContent = '♪ 音乐关闭';
      return;
    }
    audio.play().then(() => {
      btn.textContent = '♪ 音乐开启';
      localStorage.setItem(MUSIC_KEY, 'on');
    }).catch(() => {
      btn.textContent = '♪ 点击播放';
    });
  }

  function openSponsorModal() {
    document.getElementById('sponsorModal').classList.remove('hidden');
    loadSponsors();
  }

  function closeSponsorModal() {
    document.getElementById('sponsorModal').classList.add('hidden');
  }

  async function loadSponsors() {
    const container = document.getElementById('sponsorContent');
    container.innerHTML = '<div class="sponsor-loading">正在同步爱发电数据……</div>';

    let sponsors = null;

    // 1. 尝试读取本地备用 JSON（可由 GitHub Action 定期同步爱发电数据写入）
    try {
      const localRes = await fetch('sponsors.json?t=' + Date.now());
      if (localRes.ok) {
        const data = await localRes.json();
        if (Array.isArray(data) && data.length > 0) {
          sponsors = data;
        } else if (data.list && Array.isArray(data.list)) {
          sponsors = data.list;
        }
      }
    } catch (e) { /* 无本地文件则继续 */ }

    // 2. 尝试爱发电开放 API（需配置 user_id；纯前端可能受 CORS 限制）
    if (!sponsors && AFDIAN_USER_ID) {
      try {
        const res = await fetch('https://afdian.com/api/open/query-sponsor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user_id: AFDIAN_USER_ID,
            params: JSON.stringify({ page: 1, per_page: 50 })
          })
        });
        const json = await res.json();
        if (json.ec === 200 && json.data && json.data.list) {
          sponsors = json.data.list.map(s => ({
            name: s.user && s.user.name ? s.user.name : '匿名资助人',
            amount: s.all_sum_amount ? `累计 ¥${s.all_sum_amount}` : ''
          }));
        }
      } catch (e) { /* CORS 或网络错误 */ }
    }

    if (sponsors && sponsors.length > 0) {
      const ul = document.createElement('ul');
      ul.className = 'sponsor-list';
      sponsors.forEach(s => {
        const li = document.createElement('li');
        const nameSpan = document.createElement('span');
        nameSpan.className = 'sponsor-name';
        nameSpan.textContent = s.name || s.user_name || '匿名资助人';
        li.appendChild(nameSpan);
        if (s.amount || s.all_sum_amount) {
          const amtSpan = document.createElement('span');
          amtSpan.className = 'sponsor-amount';
          amtSpan.textContent = s.amount || `¥${s.all_sum_amount}`;
          li.appendChild(amtSpan);
        }
        ul.appendChild(li);
      });
      container.innerHTML = '';
      container.appendChild(ul);
    } else {
      container.innerHTML = `
        <div class="sponsor-empty">
          暂时无法自动拉取名单。<br>
          请前往
          <a class="sponsor-link" href="https://afdian.com/a/${AFDIAN_SLUG}" target="_blank" rel="noopener">爱发电 · ${AFDIAN_SLUG}</a>
          查看资助人，或在仓库中放置 <code>sponsors.json</code> 同步数据。
        </div>
      `;
    }
  }

  generateForest();
  generateTitleSpores();
  initState();
  checkMemberCard();
</script>
</body>
</html>
